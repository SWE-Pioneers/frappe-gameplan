name: Server Tests

on:
  pull_request:
  push:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: server-tests-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'frappe' }}
    timeout-minutes: 60

    strategy:
      fail-fast: false

    name: Python Unit Tests

    services:
      mariadb:
        image: mariadb:10.6
        env:
          MARIADB_ROOT_PASSWORD: 123
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=5s --health-timeout=2s --health-retries=3

    steps:
      - name: Clone
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.14"

      - name: Check for valid Python & Merge Conflicts
        run: |
          python -m compileall -q -f "${GITHUB_WORKSPACE}"
          if grep -lr --exclude-dir=node_modules "^<<<<<<< " "${GITHUB_WORKSPACE}"
              then echo "Found merge conflicts"
              exit 1
          fi

      - uses: actions/setup-node@v3
        with:
          node-version: 24
          check-latest: true

      - name: Add to Hosts
        run: |
          echo "127.0.0.1 gameplan.test" | sudo tee -a /etc/hosts

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/*requirements.txt', '**/pyproject.toml', '**/setup.py') }}
          restore-keys: |
            ${{ runner.os }}-pip-
            ${{ runner.os }}-

      - name: Install Dependencies
        run: |
          bash ${GITHUB_WORKSPACE}/.github/helper/install_dependencies.sh
          bash ${GITHUB_WORKSPACE}/.github/helper/install.sh
        env:
          BEFORE: ${{ env.GITHUB_EVENT_PATH.before }}
          AFTER: ${{ env.GITHUB_EVENT_PATH.after }}

      # `coverage` is a Frappe dev-dependency, so a bare `bench init` doesn't install
      # it. `run-tests --coverage` imports it directly, so make sure it's in the bench
      # venv. No-op when already present.
      - name: Ensure coverage tool is available
        working-directory: /home/runner/frappe-bench
        run: env/bin/pip install "coverage~=7.13.5"

      - name: Run Tests
        working-directory: /home/runner/frappe-bench
        run: |
          bench --site gameplan.test run-tests --app gameplan --coverage

      # `--coverage` writes a Cobertura coverage.xml relative to the process cwd,
      # which bench sets to the sites/ dir — so locate it rather than assume a path.
      # Normalize it to the shared summary shape for the PR-comment workflow.
      - name: Build backend coverage summary
        working-directory: /home/runner/frappe-bench
        run: |
          xml="$(find . -name coverage.xml -type f -print -quit)"
          if [ -z "$xml" ]; then
            echo "coverage.xml not found under $(pwd):"; find . -name 'coverage*' -maxdepth 3
            exit 1
          fi
          echo "Using coverage report at: $xml"
          python "${GITHUB_WORKSPACE}/.github/scripts/cobertura_to_summary.py" \
            "$xml" coverage-summary.json

      - name: Upload backend coverage summary
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary-backend
          path: /home/runner/frappe-bench/coverage-summary.json
          if-no-files-found: warn

      # The PR-comment runs in a separate workflow_run-triggered workflow that has a
      # write token even for fork PRs; it needs the PR number to know what to edit.
      - name: Record PR number for follow-up workflow
        if: github.event_name == 'pull_request'
        run: echo "${{ github.event.pull_request.number }}" > pr-number.txt

      - name: Upload PR info artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: pr-info
          path: pr-number.txt

      - name: Stop server
        if: ${{ always() }}
        run: |
          ps -ef | grep "[f]rappe serve" | awk '{print $2}' | xargs kill -s SIGINT || true
          sleep 5

      - name: Show bench output
        if: ${{ always() }}
        run: cat ~/frappe-bench/bench_start.log || true
