name: UI Test

on:
  pull_request:
  push:
    branches: [main, develop]

# Read-only: this workflow also runs untrusted code from fork PRs, so it must not
# hold write permissions. Results are reported by ui-test-report.yml via workflow_run.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'frappe' }}
    timeout-minutes: 60

    strategy:
      fail-fast: false

    name: UI Tests (Cypress)

    services:
      mariadb:
        image: mariadb:10.6
        env:
          MARIADB_ROOT_PASSWORD: 123
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=5s --health-timeout=2s --health-retries=3

    steps:
      - name: Clone
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.14"

      - name: Check for valid Python & Merge Conflicts
        run: |
          python -m compileall -q -f "${GITHUB_WORKSPACE}"
          if grep -lr --exclude-dir=node_modules "^<<<<<<< " "${GITHUB_WORKSPACE}"
              then echo "Found merge conflicts"
              exit 1
          fi

      - uses: actions/setup-node@v3
        with:
          node-version: 24
          check-latest: true

      - name: Add to Hosts
        run: |
          echo "127.0.0.1 gameplan.test" | sudo tee -a /etc/hosts

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/*requirements.txt', '**/pyproject.toml', '**/setup.py') }}
          restore-keys: |
            ${{ runner.os }}-pip-
            ${{ runner.os }}-

      - name: Cache cypress binary
        uses: actions/cache@v3
        with:
          path: ~/.cache/Cypress
          key: ${{ runner.os }}-cypress

      - name: Install Dependencies
        run: |
          bash ${GITHUB_WORKSPACE}/.github/helper/install_dependencies.sh
          bash ${GITHUB_WORKSPACE}/.github/helper/install.sh
        env:
          BEFORE: ${{ env.GITHUB_EVENT_PATH.before }}
          AFTER: ${{ env.GITHUB_EVENT_PATH.after }}

      - name: Site Setup
        run: |
          cd ~/frappe-bench/
          bench --site gameplan.test execute frappe.utils.install.complete_setup_wizard


      - name: UI Tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: frontend
        env:
          CYPRESS_BASE_URL: http://gameplan.test:8000

      # Reporting happens in ui-test-report.yml (workflow_run) so it works for fork
      # PRs too, where this workflow's token is read-only. Here we only upload the
      # raw results + the event payload (needed to resolve the PR to comment on).
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: cypress-results
          path: frontend/cypress/results/*.xml
          if-no-files-found: warn
          retention-days: 7

      - name: Upload event file
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: cypress-event
          path: ${{ github.event_path }}
          retention-days: 7

      - name: Upload failure screenshots & videos
        uses: actions/upload-artifact@v4
        if: ${{ failure() }}
        with:
          name: cypress-failure-artifacts
          path: |
            frontend/cypress/screenshots
            frontend/cypress/videos
          if-no-files-found: ignore
          retention-days: 7

      - name: Stop server
        run: |
          ps -ef | grep "[f]rappe serve" | awk '{print $2}' | xargs kill -s SIGINT
          sleep 5

      - name: Show bench output
        if: ${{ always() }}
        run: cat ~/frappe-bench/bench_start.log || true
