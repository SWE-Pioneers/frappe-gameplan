name: UI Test

on:
  pull_request:
  push:
    branches: [main, develop]

# GitHub downgrades this token to read-only for fork-originated runs regardless of
# what is declared here, so write access only applies to trusted same-repo PRs (which
# comment inline below). Fork PRs are reported by ui-test-report.yml via workflow_run.
permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'frappe' }}
    timeout-minutes: 60

    strategy:
      fail-fast: false

    name: UI Tests (Cypress)

    services:
      mariadb:
        image: mariadb:10.6
        env:
          MARIADB_ROOT_PASSWORD: 123
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=5s --health-timeout=2s --health-retries=3

    steps:
      - name: Clone
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.14"

      - name: Check for valid Python & Merge Conflicts
        run: |
          python -m compileall -q -f "${GITHUB_WORKSPACE}"
          if grep -lr --exclude-dir=node_modules "^<<<<<<< " "${GITHUB_WORKSPACE}"
              then echo "Found merge conflicts"
              exit 1
          fi

      - uses: actions/setup-node@v3
        with:
          node-version: 24
          check-latest: true

      - name: Add to Hosts
        run: |
          echo "127.0.0.1 gameplan.test" | sudo tee -a /etc/hosts

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/*requirements.txt', '**/pyproject.toml', '**/setup.py') }}
          restore-keys: |
            ${{ runner.os }}-pip-
            ${{ runner.os }}-

      - name: Cache cypress binary
        uses: actions/cache@v3
        with:
          path: ~/.cache/Cypress
          key: ${{ runner.os }}-cypress

      - name: Install Dependencies
        run: |
          bash ${GITHUB_WORKSPACE}/.github/helper/install_dependencies.sh
          bash ${GITHUB_WORKSPACE}/.github/helper/install.sh
        env:
          BEFORE: ${{ env.GITHUB_EVENT_PATH.before }}
          AFTER: ${{ env.GITHUB_EVENT_PATH.after }}
          # Instrument the SPA bundle so Cypress can harvest line coverage. Only the
          # UI-test build sets this; server-tests builds stay un-instrumented.
          COVERAGE: 'true'

      - name: Site Setup
        run: |
          cd ~/frappe-bench/
          bench --site gameplan.test execute frappe.utils.install.complete_setup_wizard


      - name: UI Tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: frontend
        env:
          CYPRESS_BASE_URL: http://gameplan.test:8000
          # The istanbul-instrumented bundle is heavier, so the editor takes longer
          # to become interactive — enough to brush the default 4s cy.type() window
          # (e.g. discussion.cy.js). Give CI headroom; local/un-instrumented runs are
          # unaffected (CYPRESS_* only overrides config for this run).
          CYPRESS_defaultCommandTimeout: '10000'

      # @cypress/code-coverage writes frontend/coverage/coverage-summary.json (nyc
      # json-summary). The PR-comment workflow turns it into a delta line.
      - name: Upload frontend coverage summary
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary-frontend
          path: frontend/coverage/coverage-summary.json
          if-no-files-found: warn

      - name: Record PR number for follow-up workflow
        if: ${{ always() && github.event_name == 'pull_request' }}
        run: echo "${{ github.event.pull_request.number }}" > pr-number.txt

      - name: Upload PR info artifact
        if: ${{ always() && github.event_name == 'pull_request' }}
        uses: actions/upload-artifact@v4
        with:
          name: pr-info
          path: pr-number.txt

      # Same-repo PRs have a read-write token, so comment directly here for instant
      # feedback. Fork PRs (read-only token) are handled by ui-test-report.yml, which
      # consumes the artifacts uploaded below — hence the same-repo-only guard.
      - name: Build markdown report
        if: ${{ always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        run: python .github/scripts/junit_to_markdown.py frontend/cypress/results "${{ github.event.pull_request.head.sha }}" > "$RUNNER_TEMP/ui-test-report.md"

      - name: Comment results on PR (same-repo)
        uses: marocchino/sticky-pull-request-comment@v2
        if: ${{ always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        with:
          header: ui-test-results
          path: ${{ runner.temp }}/ui-test-report.md

      # Uploaded for the workflow_run reporter (fork PRs): the JUnit XML plus the
      # event payload, which the report job needs to resolve which PR to comment on.
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: cypress-results
          path: frontend/cypress/results/*.xml
          if-no-files-found: warn
          retention-days: 7

      - name: Upload event file
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: cypress-event
          path: ${{ github.event_path }}
          retention-days: 7

      - name: Upload failure screenshots & videos
        uses: actions/upload-artifact@v4
        if: ${{ failure() }}
        with:
          name: cypress-failure-artifacts
          path: |
            frontend/cypress/screenshots
            frontend/cypress/videos
          if-no-files-found: ignore
          retention-days: 7

      - name: Stop server
        run: |
          ps -ef | grep "[f]rappe serve" | awk '{print $2}' | xargs kill -s SIGINT
          sleep 5

      - name: Show bench output
        if: ${{ always() }}
        run: cat ~/frappe-bench/bench_start.log || true
